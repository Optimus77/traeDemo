<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>traeDemo 计算器</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: #0b1220;
        color: #e6eaf2;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      }
      #root {
        min-height: 100%;
      }
      .boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #9aa4b2;
        letter-spacing: 0.2px;
      }
      .boot strong {
        color: #e6eaf2;
        font-weight: 600;
      }
    </style>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot"><div><strong>traeDemo</strong> 正在加载…</div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var root = document.getElementById('root');
        function showError(msg) {
          if (!root) return;
          root.innerHTML =
            '<div class="boot" style="text-align:center">' +
            '<div><strong>页面加载失败</strong><div style="margin-top:12px;max-width:720px;word-break:break-word">' +
            msg +
            '</div><div style="margin-top:12px">请打开开发者工具 Console 查看详细错误。</div></div></div>';
        }
        window.addEventListener('error', function (e) {
          var msg = (e && (e.message || (e.error && e.error.message))) || '未知错误';
          showError(msg);
        });
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e && e.reason;
          var msg = (reason && (reason.message || String(reason))) || 'Promise 未处理错误';
          showError(msg);
        });
        setTimeout(function () {
          if (!root) return;
          if (root && root.textContent && root.textContent.indexOf('正在加载') >= 0) {
            showError('应用脚本未能完成初始化（可能是静态资源加载失败或运行时报错）。');
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
